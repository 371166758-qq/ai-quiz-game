<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
.card {
  width: 1080px;
  height: 1920px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 60px;
  box-sizing: border-box;
}
h1 { font-size: 120px; margin: 0 0 40px 0; }
.emoji { font-size: 200px; margin: 40px 0; }
.features { font-size: 48px; line-height: 1.8; margin: 40px 0; }
.url { font-size: 36px; background: rgba(255,255,255,0.2); padding: 20px 40px; border-radius: 20px; margin-top: 60px; }
.qr { margin-top: 80px; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🎮</div>
  <h1>AI答题大师</h1>
  <div class="features">
    🤖 AI实时出题<br>
    📚 三大题库<br>
    🎯 智能难度<br>
    🏆 排行榜竞技
  </div>
  <div class="url">扫码挑战 →</div>
  <div class="qr"><img src="qrcode.png" width="400"></div>
</div>
</body>
</html>
